<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Will You Be My Valentine?</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <div class="card">
        <h1>💕 Will You Be My Valentine? 💕</h1>

        <div class="buttons-container">
          <button class="btn btn-yes" id="yesBtn">Yes!</button>
          <button class="btn btn-no" id="noBtn">No</button>
        </div>

        <p id="message" class="message"></p>
      </div>
    </div>

    <div class="gifts" aria-hidden="true">
      <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExd3pranBlZWNqbzN6cmxudjd4d282M3BraTAwb2l4b2thaXd1b2hoZSZlcD12MV9naWZzX3NlYXJjaCZjdD1n/sNPeJFq6YNEvLZdcqX/giphy.gif" alt="Valentine's Day Gifts" />
      <div class="gift">🐻</div>
      <div class="gift">🐼</div>
      <div class="gift">😽</div>
      <div class="gift">🎈</div>
      <div class="gift">😍</div>
      <div class="gift">🦖</div>
      <div class="gift">😭</div>
      <div class="gift">🎁</div>
      <div class="gift">🐻</div>
      <div class="gift">🐼</div>
      <div class="gift">😽</div>
      <div class="gift">🎈</div>
      <div class="gift">😍</div>
      <div class="gift">🦖</div>
      <div class="gift">😭</div>
      <div class="gift">🎁</div>
    </div>

   <div id="overlay" class="overlay">
  <div class="overlay-content">
    <h1>You have a special message...</h1>
    <button id="startBtn" class="btn-open">Open Card ❤️</button>
  </div>
</div>

<audio id="bg-music" loop>
  <source src="Music.mp3" type="audio/mpeg">
</audio>

    <script src="script.js"></script>
  </body>
</html>
